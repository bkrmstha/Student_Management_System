{% extends 'base.html' %}
{% block content %}
<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Start New Attendance Session</h4>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Select Batch</label>
                    {{ form.batch }}
                </div>
                <div class="mb-3">
                    <label>Select Subject</label>
                    {{ form.subject }}
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Date</label>
                        {{ form.date }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Start Time</label>
                        {{ form.start_time }}
                    </div>
                </div>
                <button type="submit" class="btn btn-success w-100">Initialize Attendance List</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
