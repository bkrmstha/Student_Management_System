{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block extra_css %}
<style>
    .reset-container {
        max-width: 400px;
        margin: 4rem auto;
        padding: 2rem;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .reset-title {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 1.5rem;
    }

    .reset-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .reset-btn {
        background: #3498db;
        color: white;
        padding: 1rem;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        cursor: pointer;
        transition: background 0.3s;
    }

    .reset-btn:hover {
        background: #2980b9;
    }

    .reset-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #eee;
    }

    .reset-link {
        color: #3498db;
        text-decoration: none;
    }

    .reset-link:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}
<div class="reset-container">
    <h1 class="reset-title">Reset Password</h1>
    
    <form method="post" class="reset-form">
        {% csrf_token %}
        
        <div class="form-field">
            <label for="id_email" class="field-label required">Email Address</label>
            <input type="email" name="email" id="id_email" class="field-input" required>
        </div>
        
        <button type="submit" class="reset-btn">Send Reset Link</button>
    </form>
    
    <div class="reset-footer">
        <a href="{% url 'login' %}" class="reset-link">Back to Login</a>
    </div>
</div>
{% endblock %}
