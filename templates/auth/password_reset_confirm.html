{% extends 'base.html' %}

{% block title %}Set New Password{% endblock %}

{% block extra_css %}
<style>
    .reset-container {
        max-width: 400px;
        margin: 4rem auto;
        padding: 2rem;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .reset-title {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 1.5rem;
    }

    .reset-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .reset-btn {
        background: #2ecc71;
        color: white;
        padding: 1rem;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        cursor: pointer;
        transition: background 0.3s;
    }

    .reset-btn:hover {
        background: #27ae60;
    }
</style>
{% endblock %}

{% block content %}
<div class="reset-container">
    <h1 class="reset-title">Set New Password</h1>
    
    <form method="post" class="reset-form">
        {% csrf_token %}
        
        {% for field in form %}
        <div class="form-field">
            <label for="{{ field.id_for_label }}" class="field-label required">{{ field.label }}</label>
            <input type="password" 
                   name="{{ field.name }}" 
                   id="{{ field.id_for_label }}" 
                   class="field-input" 
                   required>
            {% if field.help_text %}
                <div class="field-help">{{ field.help_text }}</div>
            {% endif %}
        </div>
        {% endfor %}
        
        <button type="submit" class="reset-btn">Change Password</button>
    </form>
</div>
{% endblock %}
