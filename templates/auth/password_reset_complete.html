{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block extra_css %}
<style>
    .message-container {
        max-width: 500px;
        margin: 4rem auto;
        padding: 2rem;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        text-align: center;
    }

    .message-icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        color: #2ecc71;
    }

    .message-title {
        color: #2c3e50;
        margin-bottom: 1rem;
    }

    .message-text {
        color: #7f8c8d;
        line-height: 1.6;
        margin-bottom: 2rem;
    }

    .message-link {
        display: inline-block;
        background: #3498db;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        text-decoration: none;
        transition: background 0.3s;
    }

    .message-link:hover {
        background: #2980b9;
    }
</style>
{% endblock %}

{% block content %}
<div class="message-container">
    <div class="message-icon">✅</div>
    <h1 class="message-title">Password Reset Complete</h1>
    <p class="message-text">
        Your password has been set. You may go ahead and log in now.
    </p>
    <a href="{% url 'login' %}" class="message-link">Log In</a>
</div>
{% endblock %}
